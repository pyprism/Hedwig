---
#  Verify Docker (assumed already installed on the host)

- name: Check if Docker is installed
  command: docker --version
  register: docker_installed
  changed_when: false
  failed_when: false

- name: Fail if Docker is not installed
  fail:
    msg: >-
      Docker is not installed on {{ inventory_hostname }}. This deployment
      assumes Docker Engine + the Compose plugin are already present on the
      host. Install them first, then re-run the playbook.
  when: docker_installed.rc != 0

- name: Check if Docker Compose plugin is available
  command: docker compose version
  register: docker_compose_check
  changed_when: false
  failed_when: false

- name: Fail if Docker Compose plugin is not available
  fail:
    msg: >-
      The Docker Compose plugin is not available on {{ inventory_hostname }}
      (`docker compose version` failed). Install the docker-compose-plugin
      package, then re-run the playbook.
  when: docker_compose_check.rc != 0

- name: Ensure deployment user is in the docker group
  user:
    name: "{{ deployment_user }}"
    groups: docker
    append: yes

# Adding the deployment user to the docker group will not take effect in the current active Ansible SSH session due
# to connection reuse (especially with pipelining = True enabled in ansible.cfg). As a result, subsequent tasks running
# as deployment_user (such as docker compose up) will fail with permission denied when trying to access the Docker
# socket. Use meta: reset_connection immediately after the group assignment to force Ansible to reconnect and pick up
#  the new group membership.
- name: Reset connection to apply group changes
  meta: reset_connection

- name: Verify Docker daemon is running
  command: docker info
  register: docker_info
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker present: {{ docker_installed.stdout | default('Docker is running') }}"

#  Clone / update repository

- name: Ensure base deployment directory exists
  file:
    path: "{{ deployment_base_dir }}"
    state: directory
    owner: "{{ deployment_user }}"
    group: "{{ deployment_user }}"
    mode: '0755'

- name: Check if repository exists
  stat:
    path: "{{ project_root }}/.git"
  register: git_repo

- name: Detect repository type
  set_fact:
    is_ssh_repo: "{{ project_repo.startswith('git@') or 'ssh://' in project_repo }}"

- name: Check if SSH key exists for deployment user
  stat:
    path: "/home/{{ deployment_user }}/.ssh/id_rsa"
  register: deploy_ssh_key
  when: is_ssh_repo

- name: Set git SSH key file path if key exists
  set_fact:
    git_ssh_key_file: "/home/{{ deployment_user }}/.ssh/id_rsa"
  when:
    - is_ssh_repo
    - deploy_ssh_key.stat.exists | default(false)

- name: Clone repository (first deployment)
  git:
    repo: "{{ project_repo }}"
    dest: "{{ project_root }}"
    version: "{{ project_branch }}"
    force: no
    accept_hostkey: yes
    key_file: "{{ git_ssh_key_file | default(omit) }}"
  become: yes
  become_user: "{{ deployment_user }}"
  when: not git_repo.stat.exists
  retries: 3
  delay: 10
  register: git_clone_result
  until: git_clone_result is success

- name: Pull latest changes (update deployment)
  git:
    repo: "{{ project_repo }}"
    dest: "{{ project_root }}"
    version: "{{ project_branch }}"
    force: yes
    update: yes
    accept_hostkey: yes
    key_file: "{{ git_ssh_key_file | default(omit) }}"
  become: yes
  become_user: "{{ deployment_user }}"
  when: git_repo.stat.exists
  register: git_pull_result
  retries: 3
  delay: 10
  until: git_pull_result is success or git_pull_result is skipped

#  Deploy .env and bring up containers

- name: Deploy environment file
  template:
    src: env.j2
    dest: "{{ project_root }}/.env"
    owner: "{{ deployment_user }}"
    group: "{{ deployment_user }}"
    mode: '0600'

- name: Ensure logs directory exists
  file:
    path: "{{ project_root }}/logs"
    state: directory
    owner: "{{ deployment_user }}"
    group: "{{ deployment_user }}"
    mode: '0755'

- name: Build and start containers
  shell: |
    cd {{ project_root }}
    docker compose up -d --build --remove-orphans
  become: yes
  become_user: "{{ deployment_user }}"
  register: compose_up_result
  changed_when: >-
    ('Started' in compose_up_result.stderr) or
    ('Created' in compose_up_result.stderr) or
    ('Recreated' in compose_up_result.stderr) or
    ('Building' in compose_up_result.stderr)

- name: Display compose output
  debug:
    msg: "{{ compose_up_result.stdout_lines | default([]) }}"

- name: Wait for container to be healthy
  shell: |
    cd {{ project_root }}
    status=$(docker compose ps --format json | python3 -c "
    import sys, json
    data = sys.stdin.read().strip()
    # docker compose v2 may output one JSON object per line or a JSON array
    entries = []
    for line in data.splitlines():
        line = line.strip()
        if line:
            parsed = json.loads(line)
            if isinstance(parsed, list):
                entries.extend(parsed)
            else:
                entries.append(parsed)
    for svc in entries:
        health = svc.get('Health', svc.get('health', ''))
        state = svc.get('State', svc.get('state', ''))
        if health:
            print(health)
        else:
            print(state)
    ")
    echo "$status"
    echo "$status" | grep -wiq "healthy"
  become: yes
  become_user: "{{ deployment_user }}"
  register: compose_health
  retries: 12
  delay: 10
  until: compose_health.rc == 0
  changed_when: false

- name: Display container health status
  debug:
    msg: "Container health: {{ compose_health.stdout }}"

- name: Run database migrations
  shell: |
    cd {{ project_root }}
    docker compose exec -T web python manage.py migrate --noinput
  become: yes
  become_user: "{{ deployment_user }}"
  register: migrate_result
  changed_when: "'Applying' in migrate_result.stdout"

- name: Display migration output
  debug:
    msg: "{{ migrate_result.stdout_lines | default([]) }}"

- name: Verify container is running
  shell: |
    cd {{ project_root }}
    docker compose ps --status running --format "{{ '{{' }}.Name{{ '}}' }}: {{ '{{' }}.Status{{ '}}' }}"
  become: yes
  become_user: "{{ deployment_user }}"
  register: container_status
  changed_when: false

- name: Prune dangling Docker images to reclaim disk space
  command: docker image prune -f
  become: yes
  become_user: "{{ deployment_user }}"
  register: image_prune
  changed_when: "'Total reclaimed space: 0B' not in image_prune.stdout"

- name: Display reclaimed disk space
  debug:
    msg: "{{ image_prune.stdout_lines | default([]) }}"

- name: Display container status
  debug:
    msg: "{{ container_status.stdout_lines | default(['No containers running']) }}"
